{% extends "base.html" %}
{% block title %}アナリティクス{% endblock %}
{% block content %}
<style>
  .an-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
  .an-title { font-size:1.4rem; font-weight:700; }
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
  .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
  .kpi-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .kpi-value { font-size:1.8rem; font-weight:700; line-height:1; }
  .kpi-value.blue { color:#1DA1F2; }
  .kpi-value.green { color:#17BF63; }
  .kpi-value.orange { color:#F45D22; }
  .kpi-value.purple { color:#9B59B6; }

  .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  @media(max-width:700px){ .chart-grid{ grid-template-columns:1fr; } }
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .chart-card.wide { grid-column:1/-1; }
  .chart-title { font-size:13px; font-weight:600; margin-bottom:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .chart-wrap { position:relative; height:180px; }

  .rank-controls { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .sort-btn { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text); font-size:12px; cursor:pointer; transition:.15s; }
  .sort-btn:hover, .sort-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .rank-table { width:100%; border-collapse:collapse; font-size:13px; }
  .rank-table th { padding:8px 10px; border-bottom:2px solid var(--border); text-align:left; color:var(--muted); font-size:11px; text-transform:uppercase; white-space:nowrap; }
  .rank-table td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .rank-table tr:last-child td { border-bottom:none; }
  .rank-table tr:hover td { background:rgba(255,255,255,.03); }
  .rank-num { font-weight:700; color:var(--muted); width:30px; }
  .rank-text { max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rank-date { color:var(--muted); font-size:11px; white-space:nowrap; }
  .medal-1 { color:#F5C518; }
  .medal-2 { color:#A0A0A0; }
  .medal-3 { color:#CD7F32; }

  .no-data { text-align:center; padding:48px 0; color:var(--muted); font-size:14px; }
  .loading { text-align:center; padding:48px 0; color:var(--muted); font-size:14px; }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to{ transform:rotate(360deg); } }

  .fetch-bar { display:flex; gap:10px; flex-wrap:wrap; }
  .badge { display:inline-block; background:var(--accent); color:#fff; border-radius:20px; padding:2px 8px; font-size:11px; font-weight:600; }
</style>

<div class="an-header">
  <div class="an-title">アナリティクス</div>
  <div class="fetch-bar">
    <form method="post" action="/analytics/fetch">
      <button class="btn btn-primary" type="submit">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        データ取得
      </button>
    </form>
  </div>
</div>

<!-- KPI cards -->
<div class="kpi-grid" id="kpi-grid">
  <div class="loading"><span class="spinner"></span>読み込み中...</div>
</div>

<!-- Charts -->
<div class="chart-grid" id="chart-grid" style="display:none;">
  <div class="chart-card wide">
    <div class="chart-title">フォロワー数推移</div>
    <div class="chart-wrap"><canvas id="chartFollowers"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">日別インプレッション</div>
    <div class="chart-wrap"><canvas id="chartImpressions"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">日別エンゲージメント率</div>
    <div class="chart-wrap"><canvas id="chartEngagement"></canvas></div>
  </div>
</div>

<!-- Ranking -->
<div class="table-wrap" id="ranking-wrap" style="display:none;">
  <div class="table-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <span class="table-title">投稿ランキング <span class="badge" id="rank-count">0</span></span>
    <div class="rank-controls">
      <button class="sort-btn active" data-sort="impressions">インプレッション</button>
      <button class="sort-btn" data-sort="likes">いいね</button>
      <button class="sort-btn" data-sort="retweets">RT</button>
      <button class="sort-btn" data-sort="engagement_rate">エンゲージメント率</button>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table class="rank-table">
      <thead>
        <tr>
          <th style="width:36px;">#</th>
          <th>内容</th>
          <th>日付</th>
          <th>IMP</th>
          <th>いいね</th>
          <th>RT</th>
          <th>返信</th>
          <th>率</th>
        </tr>
      </thead>
      <tbody id="rank-tbody"></tbody>
    </table>
  </div>
</div>

<div id="no-data" style="display:none;" class="table-wrap">
  <div class="no-data">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" style="opacity:.3;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
    データがありません。「データ取得」ボタンを押してください。
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const ACCENT = '#1DA1F2';
const GREEN  = '#17BF63';
const ORANGE = '#F45D22';
const MUTED  = 'rgba(255,255,255,0.2)';

Chart.defaults.color = 'rgba(255,255,255,0.5)';
Chart.defaults.borderColor = 'rgba(255,255,255,0.08)';
Chart.defaults.font.family = "'Segoe UI', sans-serif";

let rankData = [];
let currentSort = 'impressions';
let chartF, chartI, chartE;

function fmt(n){ return n.toLocaleString('ja-JP'); }

function medalIcon(i){
  if(i===0) return '<span class="medal-1">🥇</span>';
  if(i===1) return '<span class="medal-2">🥈</span>';
  if(i===2) return '<span class="medal-3">🥉</span>';
  return `<span class="rank-num">${i+1}</span>`;
}

function renderKPI(kpi){
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">フォロワー</div>
      <div class="kpi-value blue">${fmt(kpi.followers)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">総インプレッション</div>
      <div class="kpi-value purple">${fmt(kpi.total_impressions)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">平均エンゲージメント率</div>
      <div class="kpi-value green">${kpi.avg_engagement_rate}%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">収集投稿数</div>
      <div class="kpi-value orange">${fmt(kpi.total_posts)}</div>
    </div>
  `;
}

function renderCharts(fc, dc){
  document.getElementById('chart-grid').style.display = '';

  const baseOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false } },
    scales:{
      x:{ grid:{ color:MUTED }, ticks:{ maxRotation:45, font:{size:10} } },
      y:{ grid:{ color:MUTED }, ticks:{ font:{size:10} } }
    }
  };

  if(chartF) chartF.destroy();
  chartF = new Chart(document.getElementById('chartFollowers'), {
    type:'line',
    data:{
      labels: fc.labels,
      datasets:[{
        data: fc.data, borderColor: ACCENT, backgroundColor: ACCENT+'22',
        fill:true, tension:.35, pointRadius:4, pointHoverRadius:6
      }]
    },
    options: baseOpts
  });

  if(chartI) chartI.destroy();
  chartI = new Chart(document.getElementById('chartImpressions'), {
    type:'bar',
    data:{
      labels: dc.labels,
      datasets:[{
        data: dc.impressions, backgroundColor: ACCENT+'cc',
        borderRadius:4
      }]
    },
    options: baseOpts
  });

  if(chartE) chartE.destroy();
  chartE = new Chart(document.getElementById('chartEngagement'), {
    type:'line',
    data:{
      labels: dc.labels,
      datasets:[{
        data: dc.engagement_rates, borderColor: GREEN, backgroundColor: GREEN+'22',
        fill:true, tension:.35, pointRadius:4, pointHoverRadius:6
      }]
    },
    options:{
      ...baseOpts,
      scales:{
        ...baseOpts.scales,
        y:{ ...baseOpts.scales.y, ticks:{ callback:v=>v+'%', font:{size:10} } }
      }
    }
  });
}

function renderRanking(){
  const sorted = [...rankData].sort((a,b) => b[currentSort] - a[currentSort]);
  document.getElementById('rank-count').textContent = sorted.length;
  document.getElementById('rank-tbody').innerHTML = sorted.map((r,i) => `
    <tr>
      <td>${medalIcon(i)}</td>
      <td><div class="rank-text" title="${r.tweet_preview}">${r.tweet_preview || '—'}</div></td>
      <td><span class="rank-date">${r.date}</span></td>
      <td><strong>${fmt(r.impressions)}</strong></td>
      <td style="color:#E0245E;">${fmt(r.likes)}</td>
      <td style="color:#17BF63;">${fmt(r.retweets)}</td>
      <td style="color:var(--muted);">${fmt(r.replies)}</td>
      <td style="color:#F5A623;">${r.engagement_rate}%</td>
    </tr>
  `).join('');
  document.getElementById('ranking-wrap').style.display = '';
}

async function loadData(){
  try {
    const res = await fetch('/analytics/data');
    const d = await res.json();

    if(d.kpi.total_posts === 0 && d.kpi.followers === 0){
      document.getElementById('kpi-grid').innerHTML = '';
      document.getElementById('no-data').style.display = '';
      return;
    }

    renderKPI(d.kpi);

    if(d.followers_chart.labels.length > 0 || d.daily_chart.labels.length > 0){
      renderCharts(d.followers_chart, d.daily_chart);
    }

    rankData = d.ranking;
    if(rankData.length > 0) renderRanking();
    else document.getElementById('no-data').style.display = '';

  } catch(e){
    document.getElementById('kpi-grid').innerHTML = '<div class="no-data">データ読み込みエラー</div>';
  }
}

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderRanking();
  });
});

loadData();
</script>
{% endblock %}
